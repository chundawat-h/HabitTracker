<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>1 Year Habit Tracker</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>


</head>

<body>

<h1>365 Day Habit Tracker</h1>

<div class="controls">

<input id="habitInput" placeholder="Add Habit">
<button onclick="addHabit()">Add Habit</button>
<button onclick="restart()" class="restartBtn">Restart</button>

<span id="counter"></span>

</div>

<div class="tableContainer">

<table id="tracker">

<thead id="dayHeader"></thead>

<tbody id="habitBody"></tbody>

</table>

</div>

<h2>Weekly Tasks</h2>
<div class="weeklySection">
<input id="weeklyInput" placeholder="Add Weekly Task">
<button onclick="addWeeklyTask()">Add Task</button>
<ul id="weeklyTaskList"></ul>
</div>

<h2>Notes</h2>
<div class="notesSection">
<textarea id="notesArea" placeholder="Write your notes here..."></textarea>
<button onclick="saveNotes()">Save Notes</button>
</div>

<h2>Progress Reports</h2>

<div class="charts">
    <div class="main-charts">
        <canvas id="lineChart"></canvas>
        <canvas id="pieChart"></canvas>
    </div>
    <div id="individualCharts" class="individual-charts"></div>
</div>


<script src="script.js"></script>

</body>
</html>
